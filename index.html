<!doctype html>
<html class="no-js" lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="css/style.css?v=3">
  <meta name="description" content="">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body>

  <div id="moderatorScreen" class="screen">
    <img src="img/logo_widm.jpg" alt="Logo" class="logo">
    <div class="container-vertical">
      <input type="text" id="winnerInput" placeholder="Enter winner name">
      <button id="modSubmitBtn">Configure</button>
      <div id="modMessage" class="hidden"></div>
    </div>
  </div>

  <div id="app" class="screen initial hidden">
    <img src="img/logo_widm.jpg" alt="Logo" class="logo">
    <div class="container">
      <input type="text" id="nameInput" placeholder="Enter name">
      <button id="submitBtn">&#10141;</button>
    </div>
  </div>

  <div id="resultScreen" class="screen hidden">
    <img src="img/logo_widm.jpg" alt="Logo" class="logo" id="resultLogo">
    <div class="container-vertical">
      <div id="pauseEffect" class="hidden">EXECUTIE</div>
      <div id="resultContent" class="hidden">
        <button id="backBtn">Return</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>

</body>

</html>
